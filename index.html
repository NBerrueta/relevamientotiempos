<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0, shrink-to-fit=no">
<title>Relevamiento de Tiempos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000000; min-height: 100vh; color: #f2f2f7; margin: 0; }
  .wrap { padding: 1rem; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; padding-bottom: 2rem; }
  .card { background: #1c1c1e; border-radius: 14px; padding: 1.25rem; box-shadow: none; }
  .timer { font-size: 64px; font-weight: 300; text-align: center; letter-spacing: -2px; color: #f2f2f7; font-variant-numeric: tabular-nums; margin: 0.5rem 0 0.25rem; }
  .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.25rem; }
  button { cursor: pointer; border-radius: 10px; font-size: 15px; font-weight: 500; padding: 10px 22px; border: 1.5px solid #3a3a3c; background: #2c2c2e; color: #f2f2f7; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  button:active { transform: scale(0.97); }
  button.primary { background: #f2f2f7; color: #1c1c1e; border-color: transparent; }
  button.primary:active { background: #d1d1d6; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 13px; color: #aeaeb2; font-weight: 500; }
  select, input, textarea { font-size: 16px; color: #f2f2f7; background: #2c2c2e; border: 1.5px solid transparent; border-radius: 10px; padding: 10px 12px; width: 100%; font-family: inherit; }
  select:focus, input:focus, textarea:focus { outline: none; border-color: #636366; background: #3a3a3c; }
  textarea { resize: vertical; min-height: 70px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  
  .log-table { width: 100%; border-collapse: collapse; font-size: 12px; color: #f2f2f7; }
  .log-table th { text-align: left; color: #aeaeb2; padding: 5px; border-bottom: 1px solid #3a3a3c; }
  .log-table td { padding: 8px 5px; border-bottom: 1px solid #2c2c2e; vertical-align: middle; }
  .menu-btn { background: none; border: none; padding: 4px 8px; cursor: pointer; color: #aeaeb2; font-size: 18px; border-radius: 6px; line-height: 1; }
  .menu-btn:active { background: #2c2c2e; }
  .menu-dropdown { display: none; position: absolute; right: 0; top: 28px; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); z-index: 100; min-width: 130px; overflow: hidden; }
  .menu-dropdown.open { display: block; }
  .menu-dropdown button { display: block; width: 100%; text-align: left; padding: 10px 14px; font-size: 14px; background: none; border: none; cursor: pointer; color: #f2f2f7; font-weight: 500; }
  .menu-dropdown button:hover { background: #3a3a3c; }
  
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1c1c1e; border-radius: 14px; padding: 1.25rem; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 1rem; color: #f2f2f7; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1rem; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 500; border: 1.5px solid #3a3a3c; background: #2c2c2e; cursor: pointer; color: #f2f2f7; }
  .modal-btns button.primary { background: #f2f2f7; color: #1c1c1e; border-color: transparent; }

  .tipo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
  .tipo-btn { padding: 8px; font-size: 13px; border-radius: 8px; border: 1.5px solid #3a3a3c; background: #2c2c2e; color: #aeaeb2; font-weight: 500; }
  .tipo-btn.selected { background: #f2f2f7; color: #1c1c1e; border-color: transparent; font-weight: 700; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #f2f2f7; color: #1c1c1e; padding: 10px 20px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; font-weight: 500; z-index: 999; }
  .toast.show { opacity: 1; }
  h3 { color: #f2f2f7; font-size: 17px; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="timer" id="display">00:00:00</div>
    <div class="btn-row">
      <button class="primary" id="btnToggle" onclick="toggleTimer()">Iniciar</button>
      <button onclick="preguntarReinicio()">Reiniciar</button>
    </div>
    <div class="grid2">
        <div class="field"><label>Usuario</label><input type="text" id="usuario" placeholder="Tu nombre" /></div>
        <div class="field"><label>Operador</label><input type="text" id="operador" placeholder="Nombre operador" /></div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Sector</label>
        <select id="sector">
          <option>Mecánica</option>
          <option>Montaje</option>
          <option>Prueba Hidráulica</option>
          <option>Engrase</option>
          <option>Lavado</option>
          <option>Granallado</option>
          <option>Pintura</option>
        </select>
      </div>
      <div class="field"><label>Orden</label><input type="text" id="orden" placeholder="N° Orden" /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Material</label><input type="text" id="material" placeholder="Cod. Material" /></div>
      <div class="field"><label>Puesto de Trabajo</label><input type="text" id="puesto" placeholder="Ej: PHID 0007" /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Cantidad de Personas</label><input type="number" id="personas" value="1" min="1" /></div>
    </div>
    <div class="field">
      <label>Descripción</label>
      <textarea id="obs" placeholder="Detalle de la tarea..." rows="2"></textarea>
    </div>
    <div class="field">
      <label>Tipo de Tarea (Presionar para guardar tramo)</label>
      <div class="tipo-grid" id="tipoGrid">
        <button class="tipo-btn" onclick="selectTipo(this)">Preparación</button>
        <button class="tipo-btn" onclick="selectTipo(this)">Trabajo</button>
        <button class="tipo-btn" onclick="selectTipo(this)">Ineficiencias</button>
        <button class="tipo-btn" onclick="selectTipo(this)">Retrabajo</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3>Tramos Registrados</h3>
        <button class="primary" onclick="guardarEnSheets()" id="btnSheets">Subir a Sheets</button>
    </div>
    <div id="logArea"></div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>Modificar Tramo</h3>
    <div class="field" style="text-align:center; margin-bottom:8px;">
      <label>Duración</label>
      <input type="text" id="editDuracion" placeholder="00:00:00" style="text-align:center; font-size:28px; font-weight:300; letter-spacing:-1px; font-variant-numeric:tabular-nums;" />
    </div>
    <div class="grid2">
      <div class="field"><label>Usuario</label><input type="text" id="editUsuario" /></div>
      <div class="field"><label>Operador</label><input type="text" id="editOperador" /></div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Sector</label>
        <select id="editSector">
          <option>Mecánica</option><option>Montaje</option><option>Prueba Hidráulica</option>
          <option>Engrase</option><option>Lavado</option><option>Granallado</option><option>Pintura</option>
        </select>
      </div>
      <div class="field"><label>Orden</label><input type="text" id="editOrden" /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Material</label><input type="text" id="editMaterial" /></div>
      <div class="field"><label>Puesto de Trabajo</label><input type="text" id="editPuesto" /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Cant. de Personas</label><input type="number" id="editPersonas" min="1" /></div>
    </div>
    <div class="field">
      <label>Descripción</label>
      <textarea id="editObs" rows="2"></textarea>
    </div>
    <div class="field">
      <label>Tipo de Tarea</label>
      <div class="tipo-grid" id="editTipoGrid">
        <button class="tipo-btn" onclick="selectEditTipo(this)">Preparación</button>
        <button class="tipo-btn" onclick="selectEditTipo(this)">Trabajo</button>
        <button class="tipo-btn" onclick="selectEditTipo(this)">Ineficiencias</button>
        <button class="tipo-btn" onclick="selectEditTipo(this)">Retrabajo</button>
      </div>
    </div>
    <div class="modal-btns">
      <button onclick="closeEditModal()">Cancelar</button>
      <button class="primary" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4vh8NKPpiuWk4IIv-TDj63U_h40KjLvkOm4tm3GDLJSpdEBR4_lFcKlW3SGcEIpGY/exec';
  let startTime = null, accumulatedSeconds = 0, seconds = 0, running = false, interval = null;
  let logs = JSON.parse(localStorage.getItem('timelogs_v5') || '[]');
  let editingId = null;

  function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }

  function saveTimerState() {
    localStorage.setItem('timer_state_v1', JSON.stringify({
      running: running,
      startTime: startTime,
      accumulatedSeconds: accumulatedSeconds
    }));
  }

  function loadTimerState() {
    const saved = localStorage.getItem('timer_state_v1');
    if (saved) {
      const state = JSON.parse(saved);
      running = state.running;
      startTime = state.startTime;
      accumulatedSeconds = state.accumulatedSeconds || 0;

      if (running && startTime) {
        interval = setInterval(tick, 500);
        document.getElementById('btnToggle').textContent = 'Pausar';
        tick(); 
      } else if (!running && accumulatedSeconds > 0) {
        seconds = accumulatedSeconds;
        document.getElementById('display').textContent = fmt(seconds);
        document.getElementById('btnToggle').textContent = 'Continuar';
      }
    }
  }

  function toggleTimer() {
    running = !running;
    if (running) {
        startTime = Date.now();
        interval = setInterval(tick, 500);
        document.getElementById('btnToggle').textContent = 'Pausar';
    } else {
        clearInterval(interval);
        accumulatedSeconds += Math.floor((Date.now() - startTime) / 1000);
        seconds = accumulatedSeconds;
        document.getElementById('btnToggle').textContent = 'Continuar';
    }
    saveTimerState();
  }

  function tick() {
    if (!running) return;
    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    seconds = accumulatedSeconds + elapsed;
    document.getElementById('display').textContent = fmt(seconds);
  }

  function preguntarReinicio() {
    if (seconds > 0 || running) {
      if (confirm("¿Estás seguro de que querés reiniciar el cronómetro? El tiempo actual se perderá.")) {
        resetTimer();
      }
    } else {
      resetTimer(); // Si está en 0 y pausado, no necesita confirmación
    }
  }

  function resetTimer() { 
    accumulatedSeconds = 0; seconds = 0; 
    if (running) { startTime = Date.now(); } 
    else { startTime = null; document.getElementById('btnToggle').textContent = 'Iniciar'; }
    document.getElementById('display').textContent = '00:00:00'; 
    saveTimerState();
  }

  function selectTipo(btn) {
    document.querySelectorAll('.tipo-grid .tipo-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    guardarTramo();
  }

  function guardarTramo() {
    if (seconds === 0) { 
        showToast("Iniciá el cronómetro primero"); 
        document.querySelectorAll('.tipo-grid .tipo-btn').forEach(b => b.classList.remove('selected'));
        return; 
    }
    
    const rec = {
      id: Date.now(),
      usuario: document.getElementById('usuario').value.trim() || '-',
      operador: document.getElementById('operador').value.trim() || '-',
      sector: document.getElementById('sector').value,
      orden: document.getElementById('orden').value.trim() || '-',
      material: document.getElementById('material').value.trim() || '-',
      puesto: document.getElementById('puesto').value.trim() || '-',
      personas: document.getElementById('personas').value || '1',
      desc: document.getElementById('obs').value.trim() || '-',
      tipo: document.querySelector('.tipo-grid .tipo-btn.selected').textContent,
      duracion: fmt(seconds),
      timestamp: new Date().toLocaleTimeString('es-AR', {hour12: false})
    };
    logs.push(rec);
    localStorage.setItem('timelogs_v5', JSON.stringify(logs));
    
    // Limpiamos SOLO el campo descripción de la pantalla principal
    document.getElementById('obs').value = '';
    
    resetTimer();
    renderLogs();
    showToast("Tramo guardado localmente");
    document.querySelectorAll('.tipo-grid .tipo-btn').forEach(b => b.classList.remove('selected'));
  }

  function renderLogs() {
    if (!logs.length) {
      document.getElementById('logArea').innerHTML = '<p style="color:#636366; text-align:center; padding:10px;">Sin registros aún</p>';
      return;
    }
    // Hacemos una copia de los logs y la invertimos solo para la vista (último a primero)
    const html = '<table class="log-table"><tr><th>Tipo</th><th>Desc.</th><th>Durac.</th><th></th></tr>' +
      [...logs].reverse().map(l => `
        <tr>
          <td>${l.tipo}</td>
          <td>${l.desc}</td>
          <td style="font-variant-numeric:tabular-nums;">${l.duracion}</td>
          <td style="position:relative; text-align:right;">
            <button class="menu-btn" onclick="toggleMenu(event, ${l.id})">⋮</button>
            <div class="menu-dropdown" id="menu-${l.id}">
              <button onclick="editTramo(${l.id});closeMenus()">Modificar</button>
              <button onclick="deleteTramo(${l.id});closeMenus()" style="color:#ff3b30;">Eliminar</button>
            </div>
          </td>
        </tr>
      `).join('') + '</table>';
    document.getElementById('logArea').innerHTML = html;
  }

  function toggleMenu(e, id) {
    e.stopPropagation();
    closeMenus();
    var menu = document.getElementById('menu-' + id);
    if (menu) menu.classList.add('open');
  }

  function closeMenus() { document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('open')); }
  document.addEventListener('click', closeMenus);

  function deleteTramo(id) {
    logs = logs.filter(l => l.id !== id);
    localStorage.setItem('timelogs_v5', JSON.stringify(logs));
    renderLogs();
    showToast("Tramo eliminado");
  }

  function editTramo(id) {
    var rec = logs.find(l => l.id === id);
    if (!rec) return;
    editingId = id;
    document.getElementById('editDuracion').value = rec.duracion || '00:00:00';
    document.getElementById('editUsuario').value = rec.usuario === '-' ? '' : rec.usuario;
    document.getElementById('editOperador').value = rec.operador === '-' ? '' : rec.operador;
    document.getElementById('editSector').value = rec.sector;
    document.getElementById('editOrden').value = rec.orden === '-' ? '' : rec.orden;
    document.getElementById('editMaterial').value = rec.material === '-' ? '' : rec.material;
    document.getElementById('editPuesto').value = rec.puesto === '-' ? '' : rec.puesto;
    document.getElementById('editPersonas').value = rec.personas || '1';
    document.getElementById('editObs').value = rec.desc === '-' ? '' : rec.desc;
    
    document.querySelectorAll('#editTipoGrid .tipo-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('#editTipoGrid .tipo-btn').forEach(b => {
      if (b.textContent.trim() === rec.tipo) b.classList.add('selected');
    });
    document.getElementById('editModal').classList.add('open');
  }

  function selectEditTipo(btn) {
    document.querySelectorAll('#editTipoGrid .tipo-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function closeEditModal() { document.getElementById('editModal').classList.remove('open'); editingId = null; }

  function hmsToSec(hms) {
    var parts = (hms || '').trim().split(':'); if (parts.length !== 3) return 0;
    var h = parseInt(parts[0]), m = parseInt(parts[1]), s = parseInt(parts[2]);
    if (isNaN(h) || isNaN(m) || isNaN(s)) return 0; return h * 3600 + m * 60 + s;
  }

  function saveEdit() {
    var durStr = document.getElementById('editDuracion').value.trim();
    var durSec = hmsToSec(durStr);
    if (durSec <= 0) { showToast('La duración debe ser mayor a 00:00:00'); return; }

    var idx = logs.findIndex(l => l.id === editingId); if (idx === -1) return;
    
    logs[idx].usuario = document.getElementById('editUsuario').value.trim() || '-';
    logs[idx].operador = document.getElementById('editOperador').value.trim() || '-';
    logs[idx].sector = document.getElementById('editSector').value;
    logs[idx].orden = document.getElementById('editOrden').value.trim() || '-';
    logs[idx].material = document.getElementById('editMaterial').value.trim() || '-';
    logs[idx].puesto = document.getElementById('editPuesto').value.trim() || '-';
    logs[idx].personas = document.getElementById('editPersonas').value || '1';
    logs[idx].desc = document.getElementById('editObs').value.trim() || '-';
    
    var selTipo = document.querySelector('#editTipoGrid .tipo-btn.selected');
    if (selTipo) logs[idx].tipo = selTipo.textContent.trim();
    logs[idx].duracion = fmt(durSec);

    localStorage.setItem('timelogs_v5', JSON.stringify(logs));
    closeEditModal(); renderLogs(); showToast('Tramo modificado');
  }

  async function guardarEnSheets() {
    if (!logs.length) { showToast('No hay registros para guardar'); return; }

    const usuario = document.getElementById('usuario').value.trim();
    const operador = document.getElementById('operador').value.trim();
    const orden = document.getElementById('orden').value.trim();
    const material = document.getElementById('material').value.trim();

    if (!usuario || !operador || !orden || !material) {
        showToast("Completar Usuario, Operador, Orden y Material antes de subir");
        return;
    }

    if (running) { clearInterval(interval); running = false; saveTimerState(); }
    resetTimer(); document.getElementById('btnToggle').textContent = 'Iniciar';

    const btn = document.getElementById('btnSheets'); btn.disabled = true; btn.textContent = 'Subiendo...';
    const todayStr = new Date().toLocaleDateString('es-AR');

    const rows = logs.map(l => {
        const finalUsuario = l.usuario === '-' ? usuario : l.usuario;
        const finalOperador = l.operador === '-' ? operador : l.operador;
        const finalSector = l.sector;
        const finalOrden = l.orden === '-' ? orden : l.orden;
        const finalMaterial = l.material === '-' ? material : l.material;
        const finalPuesto = l.puesto === '-' ? document.getElementById('puesto').value.trim() || '-' : l.puesto;
        const finalPersonas = l.personas === '1' ? document.getElementById('personas').value || '1' : l.personas;
        const finalDesc = l.desc === '-' ? document.getElementById('obs').value.trim() || '-' : l.desc;

        return [
            finalUsuario,   // 0 -> Col A
            todayStr,       // 1 -> Col B
            l.timestamp,    // 2 -> Col C
            finalSector,    // 3 -> Col D
            finalOrden,     // 4 -> Col E
            finalMaterial,  // 5 -> Col F
            finalPuesto,    // 6 -> Col G
            finalPersonas,  // 7 -> Col H
            l.tipo,         // 8 -> Col I
            l.duracion,     // 9 -> Col J
            "",             // 10 -> Col K (Acumulado)
            finalOperador,  // 11 -> Col L (Operador)
            finalDesc       // 12 -> Col M (Observaciones)
        ];
    });

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows: rows })
      });
      logs = []; localStorage.setItem('timelogs_v5', '[]'); renderLogs();
      showToast("¡Guardado en Google Sheets!");
    } catch(e) {
      showToast("Error al subir. Intentá de nuevo.");
    } finally {
      btn.disabled = false; btn.textContent = 'Subir a Sheets';
    }
  }

  document.getElementById('editDuracion').addEventListener('input', function(e) {
    var raw = e.target.value.replace(/[^0-9]/g, '').slice(0, 6); var formatted = '';
    if (raw.length <= 2) { formatted = raw; } 
    else if (raw.length <= 4) { formatted = raw.slice(0,2) + ':' + raw.slice(2); } 
    else { formatted = raw.slice(0,2) + ':' + raw.slice(2,4) + ':' + raw.slice(4); }
    e.target.value = formatted;
  });

  loadTimerState();
  renderLogs();
</script>
</body>
</html>

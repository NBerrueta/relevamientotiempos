<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0, shrink-to-fit=no">
<title>Relevamiento de Tiempos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000000; min-height: 100vh; color: #f2f2f7; margin: 0; }
  .wrap { padding: 1rem; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; padding-bottom: 2rem; }
  .card { background: #1c1c1e; border-radius: 14px; padding: 1.25rem; box-shadow: none; }
  .timer { font-size: 64px; font-weight: 300; text-align: center; letter-spacing: -2px; color: #f2f2f7; font-variant-numeric: tabular-nums; margin: 0.5rem 0 0.25rem; }
  .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.25rem; }
  button { cursor: pointer; border-radius: 10px; font-size: 15px; font-weight: 500; padding: 10px 22px; border: 1.5px solid #3a3a3c; background: #2c2c2e; color: #f2f2f7; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  button:active { transform: scale(0.97); }
  button.primary { background: #f2f2f7; color: #1c1c1e; border-color: transparent; }
  button.primary:active { background: #d1d1d6; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 13px; color: #aeaeb2; font-weight: 500; }
  select, input, textarea { font-size: 16px; color: #f2f2f7; background: #2c2c2e; border: 1.5px solid transparent; border-radius: 10px; padding: 10px 12px; width: 100%; font-family: inherit; }
  select:focus, input:focus, textarea:focus { outline: none; border-color: #636366; background: #3a3a3c; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .log-table { width: 100%; border-collapse: collapse; font-size: 12px; color: #f2f2f7; }
  .log-table th { text-align: left; color: #aeaeb2; padding: 5px; border-bottom: 1px solid #3a3a3c; }
  .log-table td { padding: 8px 5px; border-bottom: 1px solid #2c2c2e; }
  .tipo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
  .tipo-btn { padding: 8px; font-size: 13px; border-radius: 8px; border: 1.5px solid #3a3a3c; background: #2c2c2e; color: #aeaeb2; font-weight: 500; }
  .tipo-btn.selected { background: #f2f2f7; color: #1c1c1e; border-color: transparent; font-weight: 700; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #f2f2f7; color: #1c1c1e; padding: 10px 20px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; font-weight: 500; z-index: 999; }
  .toast.show { opacity: 1; }
  h3 { color: #f2f2f7; font-size: 17px; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="timer" id="display">00:00:00</div>
    <div class="btn-row">
      <button class="primary" id="btnToggle" onclick="toggleTimer()">Iniciar</button>
      <button onclick="resetTimer()">Reiniciar</button>
    </div>
    <div class="grid2">
        <div class="field"><label>Usuario</label><input type="text" id="usuario" placeholder="Tu nombre" /></div>
        <div class="field"><label>Operador</label><input type="text" id="operador" placeholder="Nombre operador" /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Orden</label><input type="text" id="orden" placeholder="N° Orden" /></div>
      <div class="field"><label>Material</label><input type="text" id="material" placeholder="Cod. Material" /></div>
    </div>
    <div class="field"><label>Descripción</label><input type="text" id="obs" placeholder="Detalle de la tarea..." /></div>
    <div class="field">
      <label>Tipo de Tarea (Presionar para guardar tramo)</label>
      <div class="tipo-grid" id="tipoGrid">
        <button class="tipo-btn" onclick="selectTipo(this)">Preparación</button>
        <button class="tipo-btn" onclick="selectTipo(this)">Trabajo</button>
        <button class="tipo-btn" onclick="selectTipo(this)">Ineficiencias</button>
        <button class="tipo-btn" onclick="selectTipo(this)">Retrabajo</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3>Tramos Registrados</h3>
        <button class="primary" onclick="guardarEnSheets()" id="btnSheets">Subir a Sheets</button>
    </div>
    <div id="logArea"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4vh8NKPpiuWk4IIv-TDj63U_h40KjLvkOm4tm3GDLJSpdEBR4_lFcKlW3SGcEIpGY/exec';
  let startTime = null;
  let accumulatedSeconds = 0;
  let seconds = 0, running = false, interval = null;
  let logs = JSON.parse(localStorage.getItem('timelogs_v5') || '[]');

  function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }

  function toggleTimer() {
    running = !running;
    if (running) {
        startTime = Date.now();
        interval = setInterval(tick, 500); // Revisa dos veces por segundo para mantenerse al día
        document.getElementById('btnToggle').textContent = 'Pausar';
    } else {
        clearInterval(interval);
        accumulatedSeconds += Math.floor((Date.now() - startTime) / 1000);
        seconds = accumulatedSeconds;
        document.getElementById('btnToggle').textContent = 'Continuar';
    }
  }

  function tick() {
    if (!running) return;
    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    seconds = accumulatedSeconds + elapsed;
    document.getElementById('display').textContent = fmt(seconds);
  }

  function resetTimer() { 
    accumulatedSeconds = 0;
    seconds = 0; 
    if (running) {
        startTime = Date.now();
    } else {
        startTime = null;
        document.getElementById('btnToggle').textContent = 'Iniciar';
    }
    document.getElementById('display').textContent = '00:00:00'; 
  }

  function selectTipo(btn) {
    document.querySelectorAll('.tipo-grid .tipo-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    guardarTramo();
  }

  function guardarTramo() {
    if (seconds === 0) { 
        showToast("Iniciá el cronómetro primero"); 
        document.querySelectorAll('.tipo-grid .tipo-btn').forEach(b => b.classList.remove('selected'));
        return; 
    }
    
    const rec = {
      id: Date.now(),
      usuario: document.getElementById('usuario').value.trim() || '-',
      operador: document.getElementById('operador').value.trim() || '-',
      orden: document.getElementById('orden').value.trim() || '-',
      material: document.getElementById('material').value.trim() || '-',
      desc: document.getElementById('obs').value.trim() || '-',
      tipo: document.querySelector('.tipo-grid .tipo-btn.selected').textContent,
      duracion: fmt(seconds),
      timestamp: new Date().toLocaleTimeString('es-AR', {hour12: false})
    };
    logs.push(rec);
    localStorage.setItem('timelogs_v5', JSON.stringify(logs));
    
    resetTimer();
    renderLogs();
    showToast("Tramo guardado localmente");
    
    document.querySelectorAll('.tipo-grid .tipo-btn').forEach(b => b.classList.remove('selected'));
  }

  function renderLogs() {
    if (!logs.length) {
      document.getElementById('logArea').innerHTML = '<p style="color:#636366; text-align:center; padding:10px;">Sin registros aún</p>';
      return;
    }
    const html = '<table class="log-table"><tr><th>Tipo</th><th>Desc.</th><th>Durac.</th></tr>' +
      logs.map(l => `<tr><td>${l.tipo}</td><td>${l.desc}</td><td>${l.duracion}</td></tr>`).join('') + '</table>';
    document.getElementById('logArea').innerHTML = html;
  }

  async function guardarEnSheets() {
    if (!logs.length) { showToast('No hay registros para guardar'); return; }

    const usuario = document.getElementById('usuario').value.trim();
    const operador = document.getElementById('operador').value.trim();
    const orden = document.getElementById('orden').value.trim();
    const material = document.getElementById('material').value.trim();

    if (!usuario || !operador || !orden || !material) {
        showToast("Completar Usuario, Operador, Orden y Material antes de subir");
        return;
    }

    if (running) {
        clearInterval(interval);
        running = false;
    }
    resetTimer();
    document.getElementById('btnToggle').textContent = 'Iniciar';

    const btn = document.getElementById('btnSheets');
    btn.disabled = true;
    btn.textContent = 'Subiendo...';

    const rows = logs.map(l => [
        l.usuario === '-' ? usuario : l.usuario,
        l.operador === '-' ? operador : l.operador,
        l.timestamp,
        l.orden === '-' ? orden : l.orden,
        l.material === '-' ? material : l.material,
        l.tipo,
        l.duracion,
        l.desc
    ]);

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows: rows })
      });
      logs = []; 
      localStorage.setItem('timelogs_v5', '[]'); 
      renderLogs();
      showToast("¡Guardado en Google Sheets!");
    } catch(e) {
      showToast("Error al subir. Intentá de nuevo.");
    } finally {
      btn.disabled = false;
      btn.textContent = 'Subir a Sheets';
    }
  }

  function showToast(m) { const t = document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }
  renderLogs();
</script>
</body>
</html>
